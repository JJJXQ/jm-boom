name: build-windows-portable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build portable app
        run: bunx tauri build --no-bundle

      - name: Prepare package
        shell: pwsh
        run: |
          $outDir = "portable"
          $zipPath = "jm-boom-windows-portable.zip"

          if (Test-Path $outDir) {
            Remove-Item -LiteralPath $outDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          Copy-Item "src-tauri/target/release/jm-boom.exe" "$outDir/"
          Get-ChildItem "src-tauri/target/release" -Filter "*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination $outDir

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path "$outDir/*" -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jm-boom-windows-portable
          path: jm-boom-windows-portable.zip
