name: build-windows-portable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build portable app
        run: bun run tauri build -- --no-bundle

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item "src-tauri/target/release/jm-boom.exe" "out/"
          if (Test-Path "src-tauri/target/release/*.dll") {
            Copy-Item "src-tauri/target/release/*.dll" "out/"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jm-boom-windows-portable
          path: out/*
